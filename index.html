<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Per-page <title>/description/canonical/OG/Twitter/JSON-LD are owned by
         src/components/Seo.tsx, rendered per-route and hoisted into <head> by
         React 19. Each route's real HTML (with those tags already baked in)
         is what actually ships — see prerender.js. Nothing static is added
         here so no duplicate tags end up in the shipped output. -->
    <meta name="author" content="Matrix Vault" />

    <!-- Force light theme (dark theme removed) -->
    <script>
      document.documentElement.classList.remove('dark');
      try { localStorage.setItem('theme', 'light'); } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
